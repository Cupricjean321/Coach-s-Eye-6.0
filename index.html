<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000">
<title>Coach's Eye 3.0</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Barlow+Condensed:wght@500;700&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --accent: #e8ff47;
  --red: #ff3b30;
  --mono: 'DM Mono', monospace;
  --display: 'Barlow Condensed', sans-serif;
  --glass: rgba(0,0,0,0.5);
  --glass-border: rgba(255,255,255,0.18);
}

html, body {
  height: 100%; width: 100%;
  background: #000; color: #fff;
  font-family: var(--mono);
  overflow: hidden;
  -webkit-tap-highlight-color: transparent;
}

/* ── Full screen container ── */
#app {
  position: fixed; inset: 0;
  background: transparent;
  pointer-events: none;
}
#app > * { pointer-events: all; }

/* ── Video fills everything ── */
#video-region {
  position: fixed; inset: 0;
  display: flex; z-index: 0;
}
.video-slot {
  flex: 1; position: relative;
  display: flex; align-items: center; justify-content: center;
  background: #000; overflow: hidden;
}
.video-slot + .video-slot { border-left: 1px solid rgba(255,255,255,0.1); }

/* ── Zoom container ── */
.zoom-wrap {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden; touch-action: none;
}
.zoom-inner {
  position: relative;
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
  transform-origin: center center;
  will-change: transform;
}
.zoom-inner video {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover; display: none;
}
.zoom-inner canvas {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  pointer-events: none; touch-action: none;
}
.zoom-inner canvas.draw-active { pointer-events: all; cursor: crosshair; }

/* zoom reset button */
#zoom-reset {
  position: fixed; bottom: 180px; right: 12px;
  background: rgba(0,0,0,0.55); border: 1px solid rgba(255,255,255,0.2);
  color: rgba(255,255,255,0.7); font-family: var(--mono); font-size: 10px;
  padding: 5px 9px; border-radius: 8px; cursor: pointer; z-index: 25;
  display: none; backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
}
#zoom-reset:active { background: rgba(255,255,255,0.15); }

/* ── Camera preview ── */
#camera-preview {
  position: fixed; inset: 0; z-index: 0;
  background: #000; display: block;
}
#camera-preview video {
  width: 100%; height: 100%;
  object-fit: cover; display: block;
}
#camera-status {
  position: fixed; top: max(48px, calc(40px + env(safe-area-inset-top))); left: 10px;
  font-family: var(--mono); font-size: 10px; color: rgba(255,255,255,0.6);
  padding: 3px 8px; background: rgba(0,0,0,0.5); border-radius: 4px;
  pointer-events: none; z-index: 25; display: none;
  letter-spacing: 0.06em;
}
#cam-start-btn {
  position: fixed; inset: 0;
  z-index: 5; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px;
  cursor: pointer; background: none; border: none; padding: 0;
}
#cam-start-btn .cam-icon {
  width: 72px; height: 72px; border-radius: 50%;
  background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
  display: flex; align-items: center; justify-content: center;
  backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
}
#cam-start-btn span {
  font-family: var(--mono); font-size: 11px; color: rgba(255,255,255,0.4);
  letter-spacing: 0.08em; text-transform: uppercase;
}
}

.upload-overlay {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  background: transparent; z-index: 2;
}
.upload-overlay.hidden { display: none; }
.upload-icon-wrap {
  width: 64px; height: 64px; border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.2);
  display: flex; align-items: center; justify-content: center; opacity: 0.3;
}

/* ── Floating header — single compact bar ── */
#header {
  position: absolute; top: 0; left: 0; right: 0;
  height: max(40px, calc(32px + env(safe-area-inset-top)));
  padding: env(safe-area-inset-top) 10px 0;
  display: flex; align-items: flex-end; justify-content: space-between; gap: 8px;
  padding-bottom: 4px;
  background: linear-gradient(to bottom, rgba(0,0,0,0.65) 0%, transparent 100%);
  z-index: 20; pointer-events: none;
}
#header > * { pointer-events: all; }
#logo { font-family: var(--display); font-size: 13px; font-weight: 700; letter-spacing: 0.06em; color: var(--accent); white-space: nowrap; flex-shrink: 0; }

/* ── Mode tabs — inline in header ── */
#mode-tabs {
  display: flex; gap: 0; flex: 1; justify-content: center;
  position: static; pointer-events: all;
}
.mode-tab {
  padding: 4px 12px; text-align: center;
  font-family: var(--mono); font-size: 10px; font-weight: 500; letter-spacing: 0.06em;
  text-transform: uppercase; color: rgba(255,255,255,0.4);
  border: none; background: none; cursor: pointer;
  border-bottom: 2px solid transparent; transition: all 0.15s;
  pointer-events: all;
}
.mode-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

/* ── Floating badges ── */
#draw-badge {
  position: absolute; top: max(48px, calc(40px + env(safe-area-inset-top))); left: 10px;
  background: var(--accent); color: #000;
  font-family: var(--mono); font-size: 10px; font-weight: 500;
  padding: 3px 10px; border-radius: 4px; letter-spacing: 0.08em;
  text-transform: uppercase; display: none; pointer-events: none; z-index: 20;
}
#angle-badge {
  position: absolute; top: max(48px, calc(40px + env(safe-area-inset-top))); right: 10px;
  background: rgba(0,0,0,0.72); border: 1px solid var(--accent);
  color: var(--accent); font-family: var(--display); font-size: 30px; font-weight: 700;
  padding: 4px 14px; border-radius: 8px;
  display: none; pointer-events: none; z-index: 20;
}
/* Per-slot close button — sits just below Annotate button */
.slot-close-btn {
  position: fixed;
  top: max(46px, calc(38px + env(safe-area-inset-top)));
  right: 10px;
  width: 28px; height: 28px; border-radius: 50%;
  background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.3);
  color: #fff; font-size: 13px; cursor: pointer; z-index: 25;
  display: none; align-items: center; justify-content: center;
}
.slot-close-btn:active { background: rgba(255,255,255,0.2); }

/* Per-slot upload buttons */
.slot-load-row {
  display: flex; align-items: center; justify-content: center;
  gap: 16px; margin-top: 16px; position: relative;
}
.slot-lib-btn {
  display: flex; align-items: center; gap: 6px;
  padding: 8px 14px; border: 1px solid rgba(255,255,255,0.2);
  background: rgba(0,0,0,0.5); color: rgba(255,255,255,0.85);
  font-family: var(--mono); font-size: 11px; border-radius: 10px;
  cursor: pointer; backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
}
.slot-lib-btn:active { border-color: var(--accent); color: var(--accent); }
.slot-rec-btn {
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
}
.slot-rec-outer {
  width: 48px; height: 48px; border-radius: 50%;
  border: 3px solid rgba(255,255,255,0.85);
  display: flex; align-items: center; justify-content: center;
  transition: transform 0.12s;
}
.slot-rec-btn:active .slot-rec-outer { transform: scale(0.92); }
.slot-rec-inner {
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--red); box-shadow: 0 0 12px rgba(255,59,48,0.5);
}


/* ── Floating bottom controls ── */
#bottom {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding-bottom: env(safe-area-inset-bottom);
  background: linear-gradient(to top, rgba(0,0,0,0.75) 0%, transparent 100%);
  z-index: 20; pointer-events: none;
  display: flex; flex-direction: column;
}
#bottom > * { pointer-events: all; }

/* Floating gallery button — right side, mirrors library */
#gallery-float-btn {
  position: absolute; right: 16px;
  display: flex; align-items: center; gap: 6px;
  padding: 9px 16px; border: 1px solid var(--glass-border);
  background: var(--glass); color: rgba(255,255,255,0.85);
  font-family: var(--mono); font-size: 12px; border-radius: 10px;
  cursor: pointer; backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  transition: all 0.12s;
}
#gallery-float-btn:active { border-color: var(--accent); color: var(--accent); }

/* Load row — library left, record centred */
#load-row {
  display: flex; align-items: center; justify-content: center;
  padding: 12px 16px 8px; position: relative;
}
.load-btn-lib {
  position: absolute; left: 16px;
  display: flex; align-items: center; gap: 8px;
  padding: 9px 16px; border: 1px solid var(--glass-border);
  background: var(--glass); color: rgba(255,255,255,0.85);
  font-family: var(--mono); font-size: 12px; border-radius: 10px;
  cursor: pointer; backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  transition: all 0.12s;
}
.load-btn-lib:active { border-color: var(--accent); color: var(--accent); }
.load-btn-rec {
  display: flex; flex-direction: column; align-items: center; gap: 5px;
  cursor: pointer; transition: all 0.12s;
  touch-action: manipulation; -webkit-tap-highlight-color: transparent;
}
.load-btn-rec:active .rec-outer { transform: scale(0.93); }
.load-btn-rec:active .rec-inner { transform: scale(0.9); }
.rec-outer {
  width: 70px; height: 70px; border-radius: 50%;
  border: 4px solid rgba(255,255,255,0.85);
  display: flex; align-items: center; justify-content: center;
  transition: transform 0.12s;
}
.rec-inner {
  width: 54px; height: 54px; border-radius: 50%;
  background: var(--red); box-shadow: 0 0 20px rgba(255,59,48,0.5);
  transition: transform 0.12s;
}
.rec-label { font-size: 11px; color: rgba(255,255,255,0.45); letter-spacing: 0.07em; text-transform: uppercase; }

/* Scrubber */
#scrub-row { display: flex; align-items: center; gap: 8px; padding: 6px 14px 4px; }
#play-icon-btn {
  width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0;
  background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.25);
  color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all 0.12s; backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
}
#play-icon-btn:active { background: rgba(255,255,255,0.25); transform: scale(0.93); }
#play-icon-btn.playing { background: var(--accent); border-color: var(--accent); color: #000; }
/* Film ticker scrubber */
#scrub-row { display: flex; align-items: center; gap: 8px; padding: 6px 14px 4px; }
#ticker-wrap {
  flex: 1; position: relative; height: 44px;
  overflow: hidden; border-radius: 8px;
  background: rgba(0,0,0,0.4);
  border: 1px solid rgba(255,255,255,0.12);
  touch-action: none; cursor: grab; user-select: none;
}
#ticker-wrap:active { cursor: grabbing; }
#ticker-canvas { display: block; width: 100%; height: 100%; }
#ticker-cursor {
  position: absolute; top: 0; left: 50%; transform: translateX(-50%);
  width: 2px; height: 100%; background: var(--accent);
  pointer-events: none;
}
#ticker-cursor::before {
  content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%);
  border-left: 5px solid transparent; border-right: 5px solid transparent;
  border-top: 6px solid var(--accent);
}
#ticker-cursor::after {
  content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
  border-left: 5px solid transparent; border-right: 5px solid transparent;
  border-bottom: 6px solid var(--accent);
}
#time-disp { font-size: 11px; color: rgba(255,255,255,0.6); min-width: 80px; text-align: right; text-shadow: 0 1px 3px rgba(0,0,0,0.8); white-space: nowrap; }

/* Play row */
#play-row { display: flex; align-items: center; justify-content: center; gap: 6px; padding: 4px 14px 6px; }
.pb-btn {
  display: flex; align-items: center; justify-content: center;
  padding: 8px 14px; border: 1px solid var(--glass-border);
  background: var(--glass); color: rgba(255,255,255,0.85);
  font-family: var(--mono); font-size: 12px;
  border-radius: 9px; cursor: pointer; transition: all 0.12s; white-space: nowrap;
  backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
}
.pb-btn:active { opacity: 0.7; }
.pb-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }
.pb-btn.wide { flex: 1; max-width: 120px; }
#annotate-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }

/* Speed row */
#speed-row { display: flex; align-items: center; gap: 6px; padding: 0 14px 6px; }
#speed-row span { font-size: 10px; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 0.08em; margin-right: 2px; }
.spd-btn {
  flex: 1; padding: 7px 0; border: 1px solid var(--glass-border);
  background: var(--glass); color: rgba(255,255,255,0.55);
  font-family: var(--mono); font-size: 11px;
  border-radius: 7px; cursor: pointer; text-align: center; transition: all 0.12s;
  backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
}
.spd-btn.active { border-color: var(--accent); color: var(--accent); }

/* Draw side panel */
#draw-panel {
  position: absolute; right: 10px; top: 50%;
  transform: translateY(-50%) translateX(calc(100% + 20px));
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  z-index: 30; transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
  pointer-events: none;
}
#draw-panel.open {
  transform: translateY(-50%) translateX(0);
  pointer-events: all;
}
.dp-btn {
  width: 50px; height: 50px; border-radius: 14px;
  background: rgba(0,0,0,0.65); border: 1px solid rgba(255,255,255,0.18);
  color: rgba(255,255,255,0.8); cursor: pointer;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px;
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  transition: all 0.12s; font-family: var(--mono); font-size: 9px; letter-spacing: 0.04em;
}
.dp-btn svg { display: block; flex-shrink: 0; }
.dp-btn:active { transform: scale(0.93); }
.dp-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }
.dp-btn.active svg path, .dp-btn.active svg line, .dp-btn.active svg circle, .dp-btn.active svg rect { stroke: #000; }
.dp-divider { width: 30px; height: 1px; background: rgba(255,255,255,0.12); margin: 2px 0; }
input[type="color"] {
  width: 50px; height: 50px; border-radius: 14px;
  border: 1px solid rgba(255,255,255,0.18); padding: 6px;
  background: rgba(0,0,0,0.65); cursor: pointer;
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
}

/* Extra row */
#extra-row { display: flex; gap: 6px; padding: 0 14px 10px; }
.ex-btn {
  flex: 1; padding: 8px 0; border: 1px solid var(--glass-border);
  background: var(--glass); color: rgba(255,255,255,0.7);
  font-family: var(--mono); font-size: 11px; border-radius: 8px; cursor: pointer; text-align: center; transition: all 0.12s;
  backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
}
.ex-btn.hi { border-color: var(--accent); color: var(--accent); }
.ex-btn:active { opacity: 0.7; }

/* ── Gallery overlay ── */
#gallery-overlay {
  display: none; position: fixed; inset: 0; z-index: 100;
  background: #111; flex-direction: column;
}
#gallery-overlay.open { display: flex; }
#gallery-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: max(14px, env(safe-area-inset-top)) 16px 14px;
  background: #1a1a1a; border-bottom: 1px solid #333; flex-shrink: 0;
}
#gallery-title { font-family: var(--display); font-size: 22px; font-weight: 700; letter-spacing: 0.06em; color: var(--accent); }
#gallery-count { font-size: 11px; color: #555; font-family: var(--mono); margin-left: 8px; }
#gallery-close {
  width: 28px; height: 28px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.3);
  background: rgba(0,0,0,0.6); color: #fff; font-size: 13px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
#gallery-close:active { background: rgba(255,255,255,0.15); }
#gallery-empty {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 16px; color: #555; padding: 40px;
}
#gallery-empty svg { opacity: 0.15; }
#gallery-empty p { font-size: 14px; text-align: center; line-height: 1.6; }
#gallery-grid {
  flex: 1; overflow-y: auto; padding: 14px;
  display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px;
  align-content: start; -webkit-overflow-scrolling: touch;
  padding-bottom: max(14px, env(safe-area-inset-bottom));
}
.gallery-card {
  background: #1a1a1a; border: 1px solid #333; border-radius: 12px;
  overflow: hidden; cursor: pointer; transition: border-color 0.15s, transform 0.1s;
  display: flex; flex-direction: column;
}
.gallery-card:active { border-color: var(--accent); transform: scale(0.97); }
.gallery-thumb { width: 100%; aspect-ratio: 16/9; background: #000; position: relative; overflow: hidden; }
.gallery-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
.gallery-thumb-empty { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; opacity: 0.15; }
.gallery-info { padding: 10px 12px 6px; }
.gallery-name { font-size: 12px; color: #f0f0f0; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 4px; }
.gallery-meta { font-size: 11px; color: #555; display: flex; gap: 10px; }
.gallery-load-btn {
  margin: 8px 12px 12px; padding: 9px; border-radius: 8px; border: 1px solid #333;
  background: #222; color: #999; font-family: var(--mono); font-size: 12px;
  cursor: pointer; text-align: center; transition: all 0.12s;
}
.gallery-load-btn:active { background: var(--accent); color: #000; border-color: var(--accent); }
.gallery-delete-btn {
  position: absolute; top: 6px; right: 6px; width: 26px; height: 26px; border-radius: 50%;
  background: rgba(0,0,0,0.65); border: 1px solid rgba(255,255,255,0.2); color: #fff; font-size: 12px;
  cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 2;
}
.gallery-delete-btn:active { background: var(--red); }
</style>
</head>
<body>
<!-- Live camera preview (shows when no video loaded) -->
<div id="camera-preview">
  <video id="camera-video" autoplay playsinline muted></video>
</div>
<div id="camera-status">● LIVE</div>
<button id="cam-start-btn" onclick="requestCamera()"></button>

<div id="app">

  <!-- Full screen video -->
  <div id="video-region">
    <div class="video-slot" id="slot-a">
      <div class="upload-overlay" id="upload-a">
        <div class="upload-icon-wrap">
          <svg width="34" height="34" viewBox="0 0 34 34" fill="none">
            <rect x="2" y="6" width="30" height="22" rx="2" stroke="#fff" stroke-width="1.5"/>
            <circle cx="12" cy="16" r="4" stroke="#fff" stroke-width="1.5"/>
            <path d="M2 28l8-8 6 5 6-7 10 10" stroke="#fff" stroke-width="1.5" stroke-linejoin="round"/>
          </svg>
        </div>
      </div>
      <div class="zoom-wrap" id="zoom-wrap-a">
        <div class="zoom-inner" id="zoom-inner-a">
          <video id="video-a" playsinline webkit-playsinline></video>
          <canvas id="canvas-a"></canvas>
        </div>
      </div>
      <button class="slot-close-btn" id="close-a" onclick="closeVideo('a')" style="display:none">✕</button>
    </div>

    <div class="video-slot" id="slot-b" style="display:none">
      <div class="upload-overlay" id="upload-b">
        <div class="upload-icon-wrap">
          <svg width="34" height="34" viewBox="0 0 34 34" fill="none">
            <rect x="2" y="6" width="30" height="22" rx="2" stroke="#fff" stroke-width="1.5"/>
            <circle cx="12" cy="16" r="4" stroke="#fff" stroke-width="1.5"/>
            <path d="M2 28l8-8 6 5 6-7 10 10" stroke="#fff" stroke-width="1.5" stroke-linejoin="round"/>
          </svg>
        </div>
      </div>
      <div class="zoom-wrap" id="zoom-wrap-b">
        <div class="zoom-inner" id="zoom-inner-b">
          <video id="video-b" playsinline webkit-playsinline></video>
          <canvas id="canvas-b"></canvas>
        </div>
      </div>
      <button class="slot-close-btn" id="close-b" onclick="closeVideo('b')" style="display:none">✕</button>
    </div>
  </div>

  <!-- Zoom reset -->
  <button id="zoom-reset" onclick="resetZoom()">↺ Reset zoom</button>

  <!-- Floating header with tabs inline -->
  <div id="header">
    <div id="logo">CE 3.0</div>
    <div id="mode-tabs">
      <button class="mode-tab active" onclick="setMode('single')">Single</button>
      <button class="mode-tab" onclick="setMode('split')">Side by Side</button>
    </div>
    <button class="pb-btn" id="annotate-btn" onclick="toggleDrawBar()" style="padding:4px 10px;font-size:11px;flex-shrink:0;">✏ Annotate</button>
  </div>

  <!-- Badges -->
  <div id="draw-badge">● Draw Mode</div>
  <div id="angle-badge"></div>

  <!-- Floating bottom controls -->
  <div id="bottom">
    <div id="load-row">

        <input type="file" accept="video/*,video/mp4,video/quicktime,video/x-m4v,video/avi,video/webm,.mp4,.mov,.m4v,.avi,.webm,.mkv,.3gp" style="display:none" onchange="loadVideo('a',this)">
      </label>
      <label class="load-btn-rec" style="touch-action:manipulation;-webkit-tap-highlight-color:transparent;">

    </div>

</div>

<!-- Drawing side panel -->
<div id="draw-panel">

    Line
  </button>
  <!-- Angle -->
  <button class="dp-btn" data-tool="angle" onclick="setTool('angle')" title="Angle">
    <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><path d="M4 18h14M4 18V5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="4" y1="18" x2="16" y2="6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
    Angle
  </button>
  <!-- Arrow -->
  <button class="dp-btn" data-tool="arrow" onclick="setTool('arrow')" title="Arrow">
    <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><line x1="4" y1="18" x2="18" y2="4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M11 4h7v7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    Arrow
  </button>
  <!-- Circle -->
  <button class="dp-btn" data-tool="circle" onclick="setTool('circle')" title="Circle">
    <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/></svg>
    Circle
  </button>
  <!-- Free -->
  <button class="dp-btn" data-tool="free" onclick="setTool('free')" title="Free draw">
    <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><path d="M3 16c2-3 4-8 7-8s3 5 6 3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
    Free
  </button>
  <div class="dp-divider"></div>

    <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><path d="M5 10H14a4 4 0 0 1 0 8H9" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M5 10l4-4M5 10l4 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    Undo
  </button>

  <button class="dp-btn" onclick="clearCanvas()" title="Clear" style="color:rgba(255,100,90,0.9);border-color:rgba(255,59,48,0.3)">
    <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><path d="M5 5l12 12M17 5L5 17" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>

<!-- Gallery -->
<div id="gallery-overlay">
  <div id="gallery-header">
    <div style="display:flex;align-items:baseline">
      <span id="gallery-title">GALLERY</span>
      <span id="gallery-count"></span>

  </div>

    <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
      <rect x="4" y="8" width="40" height="32" rx="4" stroke="white" stroke-width="1.5"/>
      <circle cx="16" cy="22" r="5" stroke="white" stroke-width="1.5"/>
      <path d="M4 38l12-12 8 8 8-10 16 14" stroke="white" stroke-width="1.5" stroke-linejoin="round"/>
    </svg>
    <p>No videos yet — load a video to add it here</p>
  </div>

<script>
let tool = 'line', strokeColor = '#e8ff47';
let drawMode = false, drawing = false;
let startX = 0, startY = 0, snapshot = null;
let strokes = [], currentPts = [];
let mode = 'single', activeSlot = 'a';
let loopEnabled = false, loopIn = 0, loopOut = null;

const vidA = document.getElementById('video-a');
const vidB = document.getElementById('video-b');
const cvA  = document.getElementById('canvas-a');
const cvB  = document.getElementById('canvas-b');
const cxA  = cvA.getContext('2d');
const cxB  = cvB.getContext('2d');

function aVid() { return activeSlot === 'a' ? vidA : vidB; }
function aCv()  { return activeSlot === 'a' ? cvA  : cvB;  }
function aCx()  { return activeSlot === 'a' ? cxA  : cxB;  }

function setMode(m) {
  mode = m;
  document.querySelectorAll('.mode-tab').forEach((t,i) => t.classList.toggle('active', (m==='single'&&i===0)||(m==='split'&&i===1)));
  document.getElementById('slot-b').style.display = m === 'split' ? 'flex' : 'none';
  setTimeout(syncAll, 50);
}

function loadVideo(slot, input) {
  const file = input.files[0]; if (!file) return;
  const vid = slot === 'a' ? vidA : vidB;
  const objectUrl = URL.createObjectURL(file);
  vid.src = objectUrl;
  vid.style.display = 'block';
  document.getElementById('upload-' + slot).classList.add('hidden');
  vid.addEventListener('loadedmetadata', () => {
    syncAll(); updateTime();
    addToGallery(file, objectUrl, vid.duration);
    const closeBtn = document.getElementById('close-' + slot);
    closeBtn.style.display = 'flex';
    if (slot === 'a') {
      document.getElementById('load-row').style.display = 'none';
      if (window._cameraStop) window._cameraStop();
      detectFps(vid);
    }
  }, { once: true });
  if (slot === 'a') {
    document.getElementById('export-btn').style.display = '';
    vid.addEventListener('timeupdate', updateTime);
    vid.addEventListener('ended', () => { resetPlayBtn(); });
  }
  activeSlot = slot;
}

function closeVideo(slot) {
  const vid = slot === 'a' ? vidA : vidB;
  const cv  = slot === 'a' ? cvA  : cvB;
  const cx  = slot === 'a' ? cxA  : cxB;
  vid.pause(); vid.src = ''; vid.style.display = 'none';
  cx.clearRect(0, 0, cv.width, cv.height);
  strokes = strokes.filter(s => s.slot !== slot);
  document.getElementById('upload-' + slot).classList.remove('hidden');
  document.getElementById('close-' + slot).style.display = 'none';
  if (slot === 'a') {
    document.getElementById('export-btn').style.display = 'none';
    document.getElementById('time-disp').textContent = '0.000s';
    document.getElementById('load-row').style.display = 'flex';
    if (window._cameraStart) window._cameraStart();
  }
}

function syncOne(vid, cv) {
  if (!vid.videoWidth) return;
  cv.width = vid.videoWidth; cv.height = vid.videoHeight;
  cv.style.width = vid.offsetWidth + 'px'; cv.style.height = vid.offsetHeight + 'px';
}
function syncAll() { syncOne(vidA, cvA); syncOne(vidB, cvB); }
window.addEventListener('resize', () => { setTimeout(() => { syncAll(); redrawAll(); }, 80); });

document.getElementById('slot-a').addEventListener('click', () => activeSlot = 'a');
document.getElementById('slot-b').addEventListener('click', () => activeSlot = 'b');

// ── Drawing ────────────────────────────────────────────────────────────────────
function setTool(t) {
  tool = t;
  document.querySelectorAll('[data-tool]').forEach(b => b.classList.toggle('active', b.dataset.tool === t));
}

function toggleDrawBar() {
  const panel = document.getElementById('draw-panel');
  const btn = document.getElementById('annotate-btn');
  const open = panel.classList.toggle('open');
  btn.classList.toggle('active', open);
  if (open) {
    aVid().pause(); resetPlayBtn();
    
    
    aCv().classList.add('draw-active');
    document.getElementById('draw-badge').style.display = 'block';
    drawMode = true; attachDraw();
  } else {
    aCv().classList.remove('draw-active');
    document.getElementById('draw-badge').style.display = 'none';
    document.getElementById('angle-badge').style.display = 'none';
    drawMode = false; detachDraw();
  }
}

function attachDraw() {
  const cv = aCv();
  cv.addEventListener('mousedown', onDown); cv.addEventListener('mousemove', onMove);
  cv.addEventListener('mouseup', onUp); cv.addEventListener('mouseleave', onLeave);
  cv.addEventListener('touchstart', onTS, { passive: false });
  cv.addEventListener('touchmove', onTM, { passive: false });
  cv.addEventListener('touchend', onTE);
}
function detachDraw() {
  const cv = aCv();
  cv.removeEventListener('mousedown', onDown); cv.removeEventListener('mousemove', onMove);
  cv.removeEventListener('mouseup', onUp); cv.removeEventListener('mouseleave', onLeave);
  cv.removeEventListener('touchstart', onTS); cv.removeEventListener('touchmove', onTM); cv.removeEventListener('touchend', onTE);
}

function getPos(e) {
  const cv = aCv(), r = cv.getBoundingClientRect();
  const src = e.touches ? e.touches[0] : e;
  return { x: (src.clientX - r.left) * cv.width / r.width, y: (src.clientY - r.top) * cv.height / r.height };
}
function onTS(e) { e.preventDefault(); onDown(e); }
function onTM(e) { e.preventDefault(); onMove(e); }
function onTE(e) { onUp(e); }

function onDown(e) {
  drawing = true;
  const p = getPos(e); startX = p.x; startY = p.y; currentPts = [p];
  snapshot = aCx().getImageData(0, 0, aCv().width, aCv().height);
}

function onMove(e) {
  if (!drawing) return;
  const p = getPos(e), cx = aCx();
  cx.putImageData(snapshot, 0, 0);
  cx.strokeStyle = strokeColor; cx.lineWidth = 2.5; cx.lineJoin = 'round'; cx.lineCap = 'round';
  if (tool === 'line') { cx.beginPath(); cx.moveTo(startX,startY); cx.lineTo(p.x,p.y); cx.stroke(); }
  else if (tool === 'arrow') { drawArrow(cx, startX, startY, p.x, p.y); }
  else if (tool === 'angle') {
    const mx = (startX+p.x)/2;
    cx.beginPath(); cx.moveTo(startX,startY); cx.lineTo(mx,startY); cx.lineTo(p.x,p.y); cx.stroke();
    const ang = Math.round(Math.abs(Math.atan2(p.y-startY, p.x-mx)*180/Math.PI));
    cx.fillStyle = strokeColor; cx.font = 'bold 15px DM Mono,monospace';
    cx.fillText(ang+'°', mx+4, startY-8);
    const ab = document.getElementById('angle-badge'); ab.textContent = ang+'°'; ab.style.display = 'block';
  } else if (tool === 'circle') {
    const r = Math.hypot(p.x-startX, p.y-startY);
    cx.beginPath(); cx.arc(startX, startY, r, 0, Math.PI*2); cx.stroke();
  } else if (tool === 'free') {
    currentPts.push(p);
    cx.beginPath(); currentPts.forEach((pt,i) => i===0 ? cx.moveTo(pt.x,pt.y) : cx.lineTo(pt.x,pt.y)); cx.stroke();
  }
}

function onLeave(e) { if (drawing) onUp(e); }

function onUp(e) {
  if (!drawing) return; drawing = false;
  const src = e.changedTouches ? e.changedTouches[0] : e;
  const cv = aCv(), r = cv.getBoundingClientRect();
  const p = { x: (src.clientX-r.left)*cv.width/r.width, y: (src.clientY-r.top)*cv.height/r.height };
  strokes.push({ tool, color: strokeColor, sx: startX, sy: startY, ex: p.x, ey: p.y, pts: [...currentPts], slot: activeSlot });
  if (tool !== 'angle') document.getElementById('angle-badge').style.display = 'none';
}

function drawArrow(cx, x1, y1, x2, y2) {
  const h=16, a=Math.atan2(y2-y1,x2-x1);
  cx.beginPath(); cx.moveTo(x1,y1); cx.lineTo(x2,y2); cx.stroke();
  cx.beginPath();
  cx.moveTo(x2,y2); cx.lineTo(x2-h*Math.cos(a-0.4), y2-h*Math.sin(a-0.4));
  cx.moveTo(x2,y2); cx.lineTo(x2-h*Math.cos(a+0.4), y2-h*Math.sin(a+0.4));
  cx.stroke();
}

function renderStroke(cx, s) {
  cx.strokeStyle = s.color; cx.lineWidth = 2.5; cx.lineJoin = 'round'; cx.lineCap = 'round';
  if (s.tool === 'line') { cx.beginPath(); cx.moveTo(s.sx,s.sy); cx.lineTo(s.ex,s.ey); cx.stroke(); }
  else if (s.tool === 'arrow') { drawArrow(cx, s.sx, s.sy, s.ex, s.ey); }
  else if (s.tool === 'angle') {
    const mx = (s.sx+s.ex)/2;
    cx.beginPath(); cx.moveTo(s.sx,s.sy); cx.lineTo(mx,s.sy); cx.lineTo(s.ex,s.ey); cx.stroke();
    const ang = Math.round(Math.abs(Math.atan2(s.ey-s.sy, s.ex-mx)*180/Math.PI));
    cx.fillStyle = s.color; cx.font = 'bold 15px DM Mono,monospace'; cx.fillText(ang+'°', mx+4, s.sy-8);
  } else if (s.tool === 'circle') {
    const r = Math.hypot(s.ex-s.sx, s.ey-s.sy);
    cx.beginPath(); cx.arc(s.sx, s.sy, r, 0, Math.PI*2); cx.stroke();
  } else if (s.tool === 'free' && s.pts.length > 1) {
    cx.beginPath(); s.pts.forEach((pt,i) => i===0 ? cx.moveTo(pt.x,pt.y) : cx.lineTo(pt.x,pt.y)); cx.stroke();
  }
}

function redrawAll() {
  [[cxA,cvA,'a'],[cxB,cvB,'b']].forEach(([cx,cv,sl]) => {
    cx.clearRect(0,0,cv.width,cv.height);
    strokes.filter(s=>s.slot===sl).forEach(s=>renderStroke(cx,s));
  });
}

function undoStroke() {
  const idx = strokes.map((s,i)=>s.slot===activeSlot?i:-1).filter(i=>i>=0);
  if (idx.length) { strokes.splice(idx[idx.length-1],1); redrawAll(); }
}
function clearCanvas() {
  strokes = strokes.filter(s=>s.slot!==activeSlot);
  aCx().clearRect(0,0,aCv().width,aCv().height);
}

// ── Playback ────────────────────────────────────────────────────────────────────
function resetPlayBtn() {
  const btn = document.getElementById('play-icon-btn');
  const svg = document.getElementById('play-icon-svg');
  if (btn) btn.classList.remove('playing');
  if (svg) svg.innerHTML = '<path d="M3 2l9 5-9 5V2z"/>';
}

function togglePlay() {
  const vid = vidA;
  const btn = document.getElementById('play-icon-btn');
  const svg = document.getElementById('play-icon-svg');
  if (vid.paused) {
    vid.play();
    btn.classList.add('playing');
    svg.innerHTML = '<rect x="2" y="1" width="4" height="12" rx="1"/><rect x="8" y="1" width="4" height="12" rx="1"/>';
  } else {
    vid.pause();
    btn.classList.remove('playing');
    svg.innerHTML = '<path d="M3 2l9 5-9 5V2z"/>';
  }
}

function updateTime() {
  const t = vidA.currentTime, d = vidA.duration || 0;
  document.getElementById('time-disp').textContent = t.toFixed(3) + 's';
  if (loopEnabled && loopOut !== null && t >= loopOut) vidA.currentTime = loopIn;
  drawTicker();
}

// ── Film ticker scrubber ──────────────────────────────────────────────────────
const tickerWrap   = document.getElementById('ticker-wrap');
const tickerCanvas = document.getElementById('ticker-canvas');
const tickerCtx    = tickerCanvas.getContext('2d');
let tickerDragging = false;
let tickerLastX = 0;
let tickerPixelAccum = 0;
// Pixels per frame — smaller = more sensitive (finer control)
const PIXELS_PER_FRAME = 8;

function drawTicker() {
  const W = tickerCanvas.offsetWidth, H = tickerCanvas.offsetHeight;
  if (!W) return;
  tickerCanvas.width  = W * window.devicePixelRatio;
  tickerCanvas.height = H * window.devicePixelRatio;
  tickerCtx.scale(window.devicePixelRatio, window.devicePixelRatio);

  const dur = vidA.duration || 1;
  const t   = vidA.currentTime || 0;
  const fps = detectedFps;
  const totalFrames = Math.round(dur * fps);
  const currentFrame = Math.round(t * fps);

  // How many pixels = 1 frame on screen
  const pxPerFrame = PIXELS_PER_FRAME;
  const centerX = W / 2;

  tickerCtx.clearRect(0, 0, W, H);

  // Draw tick marks centered on current frame
  for (let f = 0; f < totalFrames; f++) {
    const x = centerX + (f - currentFrame) * pxPerFrame;
    if (x < -pxPerFrame || x > W + pxPerFrame) continue;

    const isMajor  = f % fps === 0;          // every second
    const isMid    = f % Math.round(fps/2) === 0; // every half second
    const isSmall  = f % Math.max(1, Math.round(fps/4)) === 0;

    if (!isMajor && !isMid && !isSmall) continue;

    const tickH = isMajor ? H * 0.75 : isMid ? H * 0.5 : H * 0.3;
    const alpha = isMajor ? 0.9 : isMid ? 0.55 : 0.3;

    tickerCtx.strokeStyle = `rgba(255,255,255,${alpha})`;
    tickerCtx.lineWidth   = isMajor ? 1.5 : 1;
    tickerCtx.beginPath();
    tickerCtx.moveTo(x, (H - tickH) / 2);
    tickerCtx.lineTo(x, H - (H - tickH) / 2);
    tickerCtx.stroke();

    // Second label on major ticks
    if (isMajor) {
      tickerCtx.fillStyle = 'rgba(255,255,255,0.5)';
      tickerCtx.font = `${Math.round(H * 0.22)}px DM Mono, monospace`;
      tickerCtx.textAlign = 'center';
      tickerCtx.fillText(Math.round(f / fps) + 's', x, H * 0.88);
    }
  }
}

function tickerOnDown(clientX) {
  tickerDragging = true;
  tickerLastX = clientX;
  tickerPixelAccum = 0;
  vidA.pause(); resetPlayBtn();
}

function tickerOnMove(clientX) {
  if (!tickerDragging || !vidA.duration) return;
  const delta = clientX - tickerLastX;
  tickerLastX = clientX;
  tickerPixelAccum += delta;
  const frames = Math.round(tickerPixelAccum / PIXELS_PER_FRAME);
  if (frames !== 0) {
    tickerPixelAccum -= frames * PIXELS_PER_FRAME;
    vidA.currentTime = Math.max(0, Math.min(vidA.duration, vidA.currentTime - frames / detectedFps));
    if (mode === 'split' && vidB.readyState >= 2)
      vidB.currentTime = Math.max(0, Math.min(vidB.duration, vidB.currentTime - frames / detectedFps));
    drawTicker();
  }
}

function tickerOnUp() { tickerDragging = false; tickerPixelAccum = 0; }

tickerWrap.addEventListener('mousedown',  e => { tickerOnDown(e.clientX); });
tickerWrap.addEventListener('mousemove',  e => { tickerOnMove(e.clientX); });
tickerWrap.addEventListener('mouseup',    tickerOnUp);
tickerWrap.addEventListener('mouseleave', tickerOnUp);
tickerWrap.addEventListener('touchstart', e => { e.preventDefault(); tickerOnDown(e.touches[0].clientX); }, { passive: false });
tickerWrap.addEventListener('touchmove',  e => { e.preventDefault(); tickerOnMove(e.touches[0].clientX); }, { passive: false });
tickerWrap.addEventListener('touchend',   tickerOnUp);

// Redraw ticker on timeupdate
vidA.addEventListener('timeupdate', () => { drawTicker(); });
window.addEventListener('resize', drawTicker);

// Keep updateTime working for display
function seekTo(v) {
  if (!vidA.duration) return;
  vidA.currentTime = (v / 10000) * vidA.duration;
  if (mode === 'split' && vidB.readyState >= 2)
    vidB.currentTime = (v / 10000) * (vidB.duration || 1);
}


// Auto-detect FPS when video loads using frame timing
function detectFps(vid) {
  if (!vid.duration) return;
  // Try requestVideoFrameCallback for precise detection
  if ('requestVideoFrameCallback' in vid) {
    let t1 = null;
    let samples = [];
    function sample(now, meta) {
      if (t1 !== null) samples.push(meta.mediaTime - t1);
      t1 = meta.mediaTime;
      if (samples.length < 5) {
        vid.requestVideoFrameCallback(sample);
      } else {
        const avgInterval = samples.reduce((a,b) => a+b, 0) / samples.length;
        const fps = Math.round(1 / avgInterval);
        // Snap to common frame rates
        const common = [24, 25, 30, 48, 50, 60, 120, 240];
        detectedFps = common.reduce((a, b) => Math.abs(b - fps) < Math.abs(a - fps) ? b : a);
        updateFpsDisplay();
      }
    }
    vid.requestVideoFrameCallback(sample);
  } else {
    // Fallback: check video filename/metadata hints or default to 60
    detectedFps = 60;
    updateFpsDisplay();
  }
}

function updateFpsDisplay() {
  const el = document.getElementById('fps-disp');
  if (el) el.textContent = detectedFps + 'fps';
}


function setSpeed(s) {
  vidA.playbackRate=s; vidB.playbackRate=s;
  document.querySelectorAll('.spd-btn').forEach(b=>b.classList.toggle('active',b.textContent===s+'×'));
}

function loopToggle() {
  loopEnabled=!loopEnabled;
  document.getElementById('loop-btn').classList.toggle('active',loopEnabled);
}

vidA.addEventListener('timeupdate', updateTime);

// ── Export ───────────────────────────────────────────────────────────────────
function exportFrame() {
  const vid=aVid(), cv=aCv(); if (!vid.videoWidth) return;
  const out=document.createElement('canvas'); out.width=vid.videoWidth; out.height=vid.videoHeight;
  const ox=out.getContext('2d'); ox.drawImage(vid,0,0); ox.drawImage(cv,0,0);
  const a=document.createElement('a');
  a.download='coachseye_'+vid.currentTime.toFixed(3).replace('.','-')+'s.png';
  a.href=out.toDataURL('image/png'); a.click();
}

// ── Gallery ──────────────────────────────────────────────────────────────────
let galleryItems = [];

function addToGallery(file, objectUrl, duration) {
  if (galleryItems.find(g => g.name === file.name && g.size === file.size)) return;
  const item = {
    id: Date.now(), name: file.name.replace(/\.[^.]+$/, ''), objectUrl, duration,
    date: new Date().toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' }),
    size: file.size, thumb: null
  };
  galleryItems.unshift(item);
  const tmpVid = document.createElement('video');
  tmpVid.src = objectUrl; tmpVid.muted = true; tmpVid.playsInline = true; tmpVid.currentTime = 0.1;
  tmpVid.addEventListener('seeked', () => {
    const c = document.createElement('canvas'); c.width = 320; c.height = 180;
    c.getContext('2d').drawImage(tmpVid, 0, 0, 320, 180);
    item.thumb = c.toDataURL('image/jpeg', 0.7); renderGallery();
  }, { once: true });
  tmpVid.load();
  renderGallery();
}

function fmtDur(s) { return Math.floor(s/60)+':'+String(Math.floor(s%60)).padStart(2,'0'); }

function renderGallery() {
  const grid = document.getElementById('gallery-grid');
  const empty = document.getElementById('gallery-empty');
  const count = document.getElementById('gallery-count');
  count.textContent = galleryItems.length ? ' — '+galleryItems.length+' video'+(galleryItems.length!==1?'s':'') : '';
  if (!galleryItems.length) { empty.style.display='flex'; grid.style.display='none'; return; }
  empty.style.display='none'; grid.style.display='grid'; grid.innerHTML='';
  galleryItems.forEach(item => {
    const card = document.createElement('div'); card.className='gallery-card';
    card.innerHTML=`
      <div class="gallery-thumb" style="position:relative">
        ${item.thumb ? `<img src="${item.thumb}" style="width:100%;height:100%;object-fit:cover;display:block">` : `<div class="gallery-thumb-empty"><svg width="28" height="28" viewBox="0 0 28 28" fill="none"><rect x="2" y="4" width="24" height="20" rx="2" stroke="white" stroke-width="1.3"/><path d="M11 9l8 5-8 5V9z" fill="white"/></svg></div>`}
        <button class="gallery-delete-btn" onclick="deleteGalleryItem(${item.id},event)">✕</button>
      </div>
      <div class="gallery-info">
        <div class="gallery-name">${item.name}</div>
        <div class="gallery-meta"><span>${item.date}</span>${item.duration?'<span>'+fmtDur(item.duration)+'</span>':''}</div>
      </div>
      <button class="gallery-load-btn" onclick="loadFromGallery(${item.id})">▶ Load into Analyzer</button>
    `;
    grid.appendChild(card);
  });
}

function loadFromGallery(id) {
  const item = galleryItems.find(g=>g.id===id); if (!item) return;
  vidA.src=item.objectUrl; vidA.style.display='block';
  document.getElementById('upload-a').classList.add('hidden');
  vidA.addEventListener('loadedmetadata', () => { syncAll(); updateTime(); }, { once: true });
  document.getElementById('export-btn').style.display='';
  document.getElementById('close-a').style.display='flex';
  document.getElementById('load-row').style.display='none';
  if (window._cameraStop) window._cameraStop();
  vidA.addEventListener('timeupdate', updateTime);
  activeSlot='a'; closeGallery();
}

function deleteGalleryItem(id,e) {
  e.stopPropagation(); galleryItems=galleryItems.filter(g=>g.id!==id); renderGallery();
}
function openGallery() { renderGallery(); document.getElementById('gallery-overlay').classList.add('open'); }
function closeGallery() { document.getElementById('gallery-overlay').classList.remove('open'); }

// ── Keyboard ─────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.target.tagName==='TEXTAREA') return;
  if (e.key===' ') { e.preventDefault(); togglePlay(); }
  if (e.key==='ArrowLeft') { e.preventDefault(); vidA.currentTime=Math.max(0,vidA.currentTime-1/30); }
  if (e.key==='ArrowRight') { e.preventDefault(); vidA.currentTime=Math.min(vidA.duration||0,vidA.currentTime+1/30); }
  if (e.key==='d') toggleDrawBar();
  if ((e.ctrlKey||e.metaKey)&&e.key==='z') { e.preventDefault(); undoStroke(); }
  if (e.key==='1') setSpeed(0.1); if (e.key==='2') setSpeed(0.25);
  if (e.key==='3') setSpeed(0.5); if (e.key==='4') setSpeed(1);
});

// ── Pinch to zoom ─────────────────────────────────────────────────────────────
(function() {
  const MIN_SCALE = 1, MAX_SCALE = 6;
  let scale = 1, panX = 0, panY = 0;
  let lastScale = 1, lastPanX = 0, lastPanY = 0;
  let startDist = 0, startScale = 1;
  let startMidX = 0, startMidY = 0, startPanX = 0, startPanY = 0;
  let isPinching = false, isSinglePan = false;
  let singleStartX = 0, singleStartY = 0;

  function getInner() { return document.getElementById('zoom-inner-' + activeSlot); }

  function applyTransform(s, x, y) {
    scale = Math.max(MIN_SCALE, Math.min(MAX_SCALE, s));
    panX = x; panY = y;
    const el = getInner(); if (!el) return;
    el.style.transform = `scale(${scale}) translate(${panX/scale}px, ${panY/scale}px)`;
    document.getElementById('zoom-reset').style.display = scale > 1.05 ? 'block' : 'none';
  }

  function dist(t) {
    const dx = t[0].clientX - t[1].clientX;
    const dy = t[0].clientY - t[1].clientY;
    return Math.sqrt(dx*dx + dy*dy);
  }
  function midpoint(t) {
    return { x: (t[0].clientX + t[1].clientX) / 2, y: (t[0].clientY + t[1].clientY) / 2 };
  }

  function onTouchStart(e) {
    if (drawMode) return;
    if (e.touches.length === 2) {
      isPinching = true; isSinglePan = false;
      startDist = dist(e.touches);
      startScale = scale;
      const mid = midpoint(e.touches);
      startMidX = mid.x; startMidY = mid.y;
      startPanX = panX; startPanY = panY;
      e.preventDefault();
    } else if (e.touches.length === 1 && scale > 1.05) {
      isSinglePan = true; isPinching = false;
      singleStartX = e.touches[0].clientX - panX;
      singleStartY = e.touches[0].clientY - panY;
    }
  }

  function onTouchMove(e) {
    if (drawMode) return;
    if (isPinching && e.touches.length === 2) {
      e.preventDefault();
      const newDist = dist(e.touches);
      const newScale = Math.max(MIN_SCALE, Math.min(MAX_SCALE, startScale * (newDist / startDist)));
      const mid = midpoint(e.touches);
      const dx = mid.x - startMidX;
      const dy = mid.y - startMidY;
      applyTransform(newScale, startPanX + dx, startPanY + dy);
    } else if (isSinglePan && e.touches.length === 1 && scale > 1.05) {
      e.preventDefault();
      const nx = e.touches[0].clientX - singleStartX;
      const ny = e.touches[0].clientY - singleStartY;
      applyTransform(scale, nx, ny);
    }
  }

  function onTouchEnd(e) {
    if (e.touches.length < 2) isPinching = false;
    if (e.touches.length === 0) isSinglePan = false;
    if (scale < 1.05) applyTransform(1, 0, 0);
  }

  // Attach to both zoom wraps
  ['a', 'b'].forEach(s => {
    const wrap = document.getElementById('zoom-wrap-' + s);
    if (!wrap) return;
    wrap.addEventListener('touchstart', onTouchStart, { passive: false });
    wrap.addEventListener('touchmove', onTouchMove, { passive: false });
    wrap.addEventListener('touchend', onTouchEnd);
  });

  // Reset zoom when slot changes
  document.getElementById('slot-a').addEventListener('click', () => { if (!isPinching) resetZoomState(); });
  document.getElementById('slot-b').addEventListener('click', () => { if (!isPinching) resetZoomState(); });

  function resetZoomState() { scale=1; panX=0; panY=0; const el=getInner(); if(el) el.style.transform=''; document.getElementById('zoom-reset').style.display='none'; }
  window.resetZoom = function() { scale=1; panX=0; panY=0; ['a','b'].forEach(s=>{ const el=document.getElementById('zoom-inner-'+s); if(el) el.style.transform=''; }); document.getElementById('zoom-reset').style.display='none'; };
})();


// ── Instant record trigger ────────────────────────────────────────────────────
function triggerRecord(e) {
  e.preventDefault();
  e.stopPropagation();
  document.getElementById('rec-input').click();
}


(function() {
  const preview  = document.getElementById('camera-preview');
  const camVid   = document.getElementById('camera-video');
  const status   = document.getElementById('camera-status');
  const startBtn = document.getElementById('cam-start-btn');
  let stream = null;

  async function startCamera() {
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: {
          facingMode: 'environment',
          width:  { ideal: 3840, min: 1280 },
          height: { ideal: 2160, min: 720 },
          frameRate: { ideal: 60, min: 30 },
          aspectRatio: { ideal: 16/9 }
        },
        audio: false
      });
      camVid.srcObject = stream;
      await camVid.play();
      startBtn.style.display = 'none';
      status.style.display = 'block';
    } catch (err) {
      // Permission denied — keep showing the tap button
      startBtn.style.display = 'flex';
    }
  }

  function stopCamera() {
    if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
    camVid.srcObject = null;
    preview.style.display = 'none';
    status.style.display = 'none';
    startBtn.style.display = 'none';
  }

  function restoreCamera() {
    preview.style.display = 'block';
    startBtn.style.display = 'flex';
    status.style.display = 'none';
    startCamera();
  }

  // Expose tap handler globally
  window.requestCamera = startCamera;
  window._cameraStop = stopCamera;
  window._cameraStart = restoreCamera;
})();


window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  const btn=document.createElement('button'); btn.className='ex-btn'; btn.textContent="⬇ Install Coach's Eye";
  btn.onclick=()=>e.prompt(); document.getElementById('extra-row').prepend(btn);
});
